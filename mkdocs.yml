site_name: bidiwave
site_description: WebDriver BiDi for Python — talk to any browser via W3C standard
site_url: https://mathiaspaulenko.github.io/bidiwave/
repo_url: https://github.com/MathiasPaulenko/bidiwave
repo_name: MathiasPaulenko/bidiwave
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Usage:
      - Browsing: usage/browsing.md
      - Script: usage/script.md
      - Events: usage/events.md
      - Input Simulation: usage/input.md
      - Network Interception: usage/network.md
      - Cookies & Storage: usage/storage.md
      - Emulation: usage/emulation.md
      - Permissions: usage/permissions.md
      - Preload Scripts: usage/preload.md
      - CDP: usage/cdp.md
      - Configuration: usage/configuration.md
  - Guides:
      - Browser Setup: guides/browser-setup.md
      - Cookbook: guides/cookbook.md
      - Error Handling: guides/error-handling.md
  - API Reference:
      - BiDiClient: api/client.md
      - Session: api/session.md
      - Browsing: api/browsing.md
      - Script: api/script.md
      - Network: api/network.md
      - Input: api/input.md
      - Storage: api/storage.md
      - Preload: api/preload.md
      - Emulation: api/emulation.md
      - Permissions: api/permissions.md
      - Log: api/log.md
      - CDP: api/cdp.md
      - Web Extension: api/web-extension.md
      - Events: api/events.md
      - RemoteValue: api/remote-value.md
      - Exceptions: api/exceptions.md
      - Config: api/config.md
  - Reference:
      - Protocol Reference: reference/protocol-reference.md
      - Changelog: reference/changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
